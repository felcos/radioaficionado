# CI/CD — Compilar, testear y compilar imagen Docker
name: CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  compilar-y-testear:
    name: Compilar y testear
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: radioaficionado_test
          POSTGRES_USER: radio_test
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U radio_test -d radioaficionado_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restaurar dependencias
        run: dotnet restore RadioAficionado.slnx

      - name: Compilar
        run: dotnet build RadioAficionado.slnx --no-restore -c Release

      - name: Ejecutar tests
        run: dotnet test RadioAficionado.slnx --no-build -c Release --logger "trx;LogFileName=resultados.trx" --results-directory ./resultados-tests
        env:
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=radioaficionado_test;Username=radio_test;Password=test_password

      - name: Publicar resultados de tests
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Resultados Tests
          path: ./resultados-tests/**/*.trx
          reporter: dotnet-trx

  docker:
    name: Imagen Docker
    runs-on: ubuntu-latest
    needs: compilar-y-testear
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compilar imagen Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: radioaficionado:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
